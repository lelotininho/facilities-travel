name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          mkdir -p artifacts
          zip -r artifacts/dist-${{ github.ref_name }}.zip dist

      - name: Create or update GitHub Release and upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/dist-${{ github.ref_name }}.zip --title "Release ${{ github.ref_name }}" --notes "Prebuilt dist for easy download and use." --repo ${{ github.repository }} || \
          gh release upload "${{ github.ref_name }}" artifacts/dist-${{ github.ref_name }}.zip --clobber --repo ${{ github.repository }}
